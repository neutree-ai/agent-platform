apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "env-runner-k8s.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "env-runner-k8s.labels" . | nindent 4 }}
---
# The runner manages workspace pods in THIS cluster via the in-cluster API. It
# needs only the subset the KubernetesProvider uses: pods/services/events/pvcs +
# deployments. No secrets/configmaps, no nodes.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "env-runner-k8s.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "env-runner-k8s.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "events", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "env-runner-k8s.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "env-runner-k8s.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "env-runner-k8s.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "env-runner-k8s.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
