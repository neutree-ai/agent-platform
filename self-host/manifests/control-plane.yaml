apiVersion: v1
kind: ServiceAccount
metadata:
  name: nap-cp
  namespace: ${NAMESPACE}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nap-cp
  namespace: ${NAMESPACE}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "secrets", "configmaps", "events", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nap-cp
  namespace: ${NAMESPACE}
subjects:
  - kind: ServiceAccount
    name: nap-cp
    namespace: ${NAMESPACE}
roleRef:
  kind: Role
  name: nap-cp
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nap-cp-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nap-cp-node-reader
subjects:
  - kind: ServiceAccount
    name: nap-cp
    namespace: ${NAMESPACE}
roleRef:
  kind: ClusterRole
  name: nap-cp-node-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nap-cp
  namespace: ${NAMESPACE}
  labels:
    app: nap-cp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nap-cp
  template:
    metadata:
      labels:
        app: nap-cp
    spec:
      serviceAccountName: nap-cp
      terminationGracePeriodSeconds: 150
      containers:
        - name: control-plane
          image: ${REGISTRY}/nap-cp:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: K8S_NAMESPACE
              value: "${NAMESPACE}"
            - name: AGENT_IMAGE_PREFIX
              value: "${AGENT_IMAGE_PREFIX}"
            - name: AGENT_IMAGE_TAG
              value: "${AGENT_IMAGE_TAG}"
            - name: AGENT_STORAGE_CLASS
              value: "${AGENT_STORAGE_CLASS}"
            # Public registry: agent pods need no pull secret. cp injects this
            # into spawned workspace PodSpecs — empty means "no imagePullSecrets".
            - name: IMAGE_PULL_SECRET
              value: ""
            - name: AGENT_NODE_SELECTOR
              value: "${AGENT_NODE_SELECTOR}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nap-pg-user
                  key: password
            - name: DATABASE_URL
              value: "postgresql://${PG_USERNAME}:$(POSTGRES_PASSWORD)@nap-pg-rw:5432/nap"
            - name: CONTROL_PLANE_URL
              value: "http://nap-cp.${NAMESPACE}.svc.cluster.local:3000"
            - name: BROWSER_SERVICE_URL
              value: "http://nap-browser:3005"
            - name: BROWSER_PUBLIC_URL
              value: "http://${TOS_HOST}:${BROWSER_NODE_PORT}"
            - name: SANDBOX_SERVICE_URL
              value: "http://nap-sandbox:3006"
            - name: SANDBOX_PUBLIC_URL
              value: "http://${TOS_HOST}:${SANDBOX_NODE_PORT}"
            - name: AFS_ENABLED
              value: "true"
            - name: AFS_IMAGE
              value: "${REGISTRY}/afs:${IMAGE_TAG}"
            - name: AFS_CONTROLLER_ADDR
              value: "afs-controller.${NAMESPACE}.svc:9100"
            - name: MEMORY_FUSE_IMAGE
              value: "${REGISTRY}/nap-memory-fuse:${IMAGE_TAG}"
            - name: OFFICE_CONVERTER_URL
              value: "http://nap-office-converter:3007"
            - name: WEB_PUBLIC_URL
              value: "http://${TOS_HOST}:${TOS_NODE_PORT}"
            - name: FILES_PUBLIC_URL
              value: "http://${TOS_HOST}:${TOS_NODE_PORT}"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nap-cp-secret
                  key: JWT_SECRET
            - name: CREDENTIAL_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: nap-cp-secret
                  key: CREDENTIAL_ENCRYPTION_KEY
            - name: LDAP_URL
              valueFrom:
                secretKeyRef:
                  name: nap-cp-secret
                  key: LDAP_URL
                  optional: true
            - name: LDAP_BIND_DN
              valueFrom:
                secretKeyRef:
                  name: nap-cp-secret
                  key: LDAP_BIND_DN
                  optional: true
            - name: LDAP_BIND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nap-cp-secret
                  key: LDAP_BIND_PASSWORD
                  optional: true
            - name: LDAP_SEARCH_BASE
              valueFrom:
                secretKeyRef:
                  name: nap-cp-secret
                  key: LDAP_SEARCH_BASE
                  optional: true
            - name: LDAP_SEARCH_FILTER
              valueFrom:
                secretKeyRef:
                  name: nap-cp-secret
                  key: LDAP_SEARCH_FILTER
                  optional: true
            - name: LDAP_ATTR_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nap-cp-secret
                  key: LDAP_ATTR_USERNAME
                  optional: true
            - name: LDAP_ATTR_NAME
              valueFrom:
                secretKeyRef:
                  name: nap-cp-secret
                  key: LDAP_ATTR_NAME
                  optional: true
            - name: LDAP_ATTR_EMAIL
              valueFrom:
                secretKeyRef:
                  name: nap-cp-secret
                  key: LDAP_ATTR_EMAIL
                  optional: true
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "4Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /_cp/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_cp/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nap-cp
  namespace: ${NAMESPACE}
  labels:
    app: nap-cp
spec:
  type: ${SERVICE_TYPE}
  selector:
    app: nap-cp
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: ${TOS_NODE_PORT}
      name: http
