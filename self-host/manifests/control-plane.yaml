apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${APP_PREFIX}-cp
  namespace: ${NAMESPACE}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${APP_PREFIX}-cp
  namespace: ${NAMESPACE}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "secrets", "configmaps", "events", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${APP_PREFIX}-cp
  namespace: ${NAMESPACE}
subjects:
  - kind: ServiceAccount
    name: ${APP_PREFIX}-cp
    namespace: ${NAMESPACE}
roleRef:
  kind: Role
  name: ${APP_PREFIX}-cp
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ${APP_PREFIX}-cp-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ${APP_PREFIX}-cp-node-reader
subjects:
  - kind: ServiceAccount
    name: ${APP_PREFIX}-cp
    namespace: ${NAMESPACE}
roleRef:
  kind: ClusterRole
  name: ${APP_PREFIX}-cp-node-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APP_PREFIX}-cp
  namespace: ${NAMESPACE}
  labels:
    app: ${APP_PREFIX}-cp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${APP_PREFIX}-cp
  template:
    metadata:
      labels:
        app: ${APP_PREFIX}-cp
    spec:
      serviceAccountName: ${APP_PREFIX}-cp
      terminationGracePeriodSeconds: 150
      containers:
        - name: control-plane
          image: ${PLATFORM_IMAGE_PREFIX}-cp:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: K8S_NAMESPACE
              value: "${NAMESPACE}"
            - name: AGENT_IMAGE_PREFIX
              value: "${AGENT_IMAGE_PREFIX}"
            - name: AGENT_IMAGE_TAG
              value: "${AGENT_IMAGE_TAG}"
            - name: AGENT_STORAGE_CLASS
              value: "${AGENT_STORAGE_CLASS}"
            # imagePullSecret name that cp injects into spawned workspace
            # PodSpecs. Empty (the connected default) means "no imagePullSecrets"
            # — agent images come from the public registry. A mirrored/offline
            # install sets IMAGE_PULL_SECRET so workspace pods can pull too.
            - name: IMAGE_PULL_SECRET
              value: "${IMAGE_PULL_SECRET}"
            - name: AGENT_NODE_SELECTOR
              value: "${AGENT_NODE_SELECTOR}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${APP_PREFIX}-pg-user
                  key: password
            - name: DATABASE_URL
              value: "postgresql://${PG_USERNAME}:$(POSTGRES_PASSWORD)@${APP_PREFIX}-pg-rw:5432/${DB_NAME}"
            - name: CONTROL_PLANE_URL
              value: "http://${APP_PREFIX}-cp.${NAMESPACE}.svc.cluster.local:3000"
            - name: BROWSER_SERVICE_URL
              value: "http://${APP_PREFIX}-browser:3005"
            - name: BROWSER_PUBLIC_URL
              value: "${BROWSER_PUBLIC_URL}"
            - name: SANDBOX_SERVICE_URL
              value: "http://${APP_PREFIX}-sandbox:3006"
            - name: SANDBOX_PUBLIC_URL
              value: "${SANDBOX_PUBLIC_URL}"
            # Injected into workspace pods as CP_URL (k8s-provider). Without it
            # the code falls back to http://nap-cp:3000, which only resolves
            # when APP_PREFIX is "nap". Keep in sync with env-runner-k8s.yaml.
            - name: CP_SERVICE_URL
              value: "http://${APP_PREFIX}-cp:3000"
            - name: SKILLS_CONTENT_URL
              value: "http://${APP_PREFIX}-skills:3008"
            # Reverse-proxy target for /_cg/* (cg-proxy). Without it the code
            # falls back to http://nap-cg:3002, which only resolves when
            # APP_PREFIX is "nap", so /_cg/connectors 502s on other installs.
            - name: CG_URL
              value: "http://${APP_PREFIX}-cg:3002"
            - name: AFS_ENABLED
              value: "true"
            - name: AFS_IMAGE
              value: "${AFS_IMAGE}"
            - name: AFS_CONTROLLER_ADDR
              value: "afs-controller.${NAMESPACE}.svc:9100"
            - name: MEMORY_FUSE_IMAGE
              value: "${PLATFORM_IMAGE_PREFIX}-memory-fuse:${IMAGE_TAG}"
            - name: OFFICE_CONVERTER_URL
              value: "http://${APP_PREFIX}-office-converter:3007"
            - name: WEB_PUBLIC_URL
              value: "${WEB_PUBLIC_URL}"
            - name: FILES_PUBLIC_URL
              value: "${FILES_PUBLIC_URL}"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ${APP_PREFIX}-cp-secret
                  key: JWT_SECRET
            - name: CREDENTIAL_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: ${APP_PREFIX}-cp-secret
                  key: CREDENTIAL_ENCRYPTION_KEY
            - name: LDAP_URL
              valueFrom:
                secretKeyRef:
                  name: ${APP_PREFIX}-cp-secret
                  key: LDAP_URL
                  optional: true
            - name: LDAP_BIND_DN
              valueFrom:
                secretKeyRef:
                  name: ${APP_PREFIX}-cp-secret
                  key: LDAP_BIND_DN
                  optional: true
            - name: LDAP_BIND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${APP_PREFIX}-cp-secret
                  key: LDAP_BIND_PASSWORD
                  optional: true
            - name: LDAP_SEARCH_BASE
              valueFrom:
                secretKeyRef:
                  name: ${APP_PREFIX}-cp-secret
                  key: LDAP_SEARCH_BASE
                  optional: true
            - name: LDAP_SEARCH_FILTER
              valueFrom:
                secretKeyRef:
                  name: ${APP_PREFIX}-cp-secret
                  key: LDAP_SEARCH_FILTER
                  optional: true
            - name: LDAP_ATTR_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ${APP_PREFIX}-cp-secret
                  key: LDAP_ATTR_USERNAME
                  optional: true
            - name: LDAP_ATTR_NAME
              valueFrom:
                secretKeyRef:
                  name: ${APP_PREFIX}-cp-secret
                  key: LDAP_ATTR_NAME
                  optional: true
            - name: LDAP_ATTR_EMAIL
              valueFrom:
                secretKeyRef:
                  name: ${APP_PREFIX}-cp-secret
                  key: LDAP_ATTR_EMAIL
                  optional: true
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "4Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /_cp/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_cp/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ${APP_PREFIX}-cp
  namespace: ${NAMESPACE}
  labels:
    app: ${APP_PREFIX}-cp
spec:
  type: ${SERVICE_TYPE}
  selector:
    app: ${APP_PREFIX}-cp
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: ${NAP_NODE_PORT}
      name: http
