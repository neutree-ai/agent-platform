apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APP_PREFIX}-skills
  namespace: ${NAMESPACE}
  labels:
    app: ${APP_PREFIX}-skills
spec:
  # Must stay at 1: dufs caches unpacked skill content on local disk; multiple
  # replicas would each maintain an independent cache with no coherency.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ${APP_PREFIX}-skills
  template:
    metadata:
      labels:
        app: ${APP_PREFIX}-skills
    spec:
      containers:
        - name: skills-content-service
          image: ${PLATFORM_IMAGE_PREFIX}-skills-content-service:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3008
              name: http
          env:
            - name: PORT
              value: "3008"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${APP_PREFIX}-pg-user
                  key: password
            - name: DATABASE_URL
              value: "postgresql://${PG_USERNAME}:$(POSTGRES_PASSWORD)@${APP_PREFIX}-pg-rw:5432/${DB_NAME}"
            - name: CACHE_DIR
              value: /var/cache/skills-content
          volumeMounts:
            - name: dufs-cache
              mountPath: /var/cache/skills-content
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            # Steady state is ~130Mi, but /package reads each skill tarball
            # fully into memory, so a burst of concurrent downloads (many
            # workspaces reloading at once, plus npx-skills export fetches)
            # stacks tarballs and OOM-killed the pod at 512Mi. Raised for
            # headroom; the real fix is streaming /package from pg rather
            # than buffering (tracked separately).
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3008
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3008
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        # emptyDir: cache survives container restarts within the pod, lost on
        # pod reschedule. The DB is the source of truth; cache rebuilds on demand.
        - name: dufs-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ${APP_PREFIX}-skills
  namespace: ${NAMESPACE}
  labels:
    app: ${APP_PREFIX}-skills
spec:
  type: ClusterIP
  selector:
    app: ${APP_PREFIX}-skills
  ports:
    - port: 3008
      targetPort: 3008
      name: http
