apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APP_PREFIX}-scheduler
  namespace: ${NAMESPACE}
  labels:
    app: ${APP_PREFIX}-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${APP_PREFIX}-scheduler
  template:
    metadata:
      labels:
        app: ${APP_PREFIX}-scheduler
    spec:
      containers:
        - name: scheduler
          image: ${PLATFORM_IMAGE_PREFIX}-scheduler:${IMAGE_TAG}
          imagePullPolicy: Always
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${APP_PREFIX}-pg-user
                  key: password
            - name: DATABASE_URL
              value: "postgresql://${PG_USERNAME}:$(POSTGRES_PASSWORD)@${APP_PREFIX}-pg-rw:5432/${DB_NAME}"
            - name: NAP_API_URL
              value: "http://${APP_PREFIX}-cp:3000"
            - name: CG_API_URL
              value: "http://${APP_PREFIX}-cg:3002"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
