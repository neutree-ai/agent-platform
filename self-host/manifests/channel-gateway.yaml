apiVersion: apps/v1
kind: Deployment
metadata:
  name: nap-cg
  namespace: ${NAMESPACE}
  labels:
    app: nap-cg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nap-cg
  template:
    metadata:
      labels:
        app: nap-cg
    spec:
      containers:
        - name: channel-gateway
          image: ${REGISTRY}/nap-cg:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
              name: http
          env:
            - name: PORT
              value: "3002"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nap-pg-user
                  key: password
            - name: DATABASE_URL
              value: "postgresql://${PG_USERNAME}:$(POSTGRES_PASSWORD)@nap-pg-rw:5432/nap"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nap-cp-secret
                  key: JWT_SECRET
            - name: NAP_API_URL
              value: "http://nap-cp:3000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nap-cg
  namespace: ${NAMESPACE}
  labels:
    app: nap-cg
spec:
  type: ClusterIP
  selector:
    app: nap-cg
  ports:
    - port: 3002
      targetPort: 3002
      name: http
