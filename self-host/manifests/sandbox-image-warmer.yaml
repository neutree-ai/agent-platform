# Pre-pull sandbox images on nodes so sandbox creation is fast.
# DaemonSet ensures new nodes also get warmed automatically.
#
# Connected variant: chromium-headful is an app image under ${REGISTRY}; the
# language runtimes + pause come straight from their public upstreams.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sandbox-image-warmer
  namespace: ${NAMESPACE}
spec:
  selector:
    matchLabels:
      app: sandbox-image-warmer
  template:
    metadata:
      labels:
        app: sandbox-image-warmer
    spec:
      tolerations:
        - operator: "Exists"
      initContainers:
        - name: pull-chromium-headful
          image: ${REGISTRY}/chromium-headful:${IMAGE_TAG}
          command: ["true"]
          resources:
            requests:
              cpu: 1m
              memory: 1Mi
        - name: pull-node-22
          image: ${RUNTIME_NODE_IMAGE}
          command: ["true"]
          resources:
            requests:
              cpu: 1m
              memory: 1Mi
        - name: pull-python-3-12
          image: ${RUNTIME_PYTHON_IMAGE}
          command: ["true"]
          resources:
            requests:
              cpu: 1m
              memory: 1Mi
        - name: pull-golang-1-23
          image: ${RUNTIME_GOLANG_IMAGE}
          command: ["true"]
          resources:
            requests:
              cpu: 1m
              memory: 1Mi
      containers:
        - name: pause
          image: ${PAUSE_IMAGE}
          resources:
            requests:
              cpu: 1m
              memory: 1Mi
