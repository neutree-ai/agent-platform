apiVersion: batch/v1
kind: Job
metadata:
  name: ${APP_PREFIX}-seed-admin
  namespace: ${NAMESPACE}
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: seed
          image: ${PLATFORM_IMAGE_PREFIX}-cp:${IMAGE_TAG}
          command: ["node", "dist/seed-admin.js"]
          args:
            - "--username"
            - "${ADMIN_USERNAME}"
            - "--password"
            - "${ADMIN_PASSWORD}"
            - "--display-name"
            - "${ADMIN_DISPLAY_NAME}"
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${APP_PREFIX}-pg-user
                  key: password
            - name: DATABASE_URL
              value: "postgresql://${PG_USERNAME}:$(POSTGRES_PASSWORD)@${APP_PREFIX}-pg-rw:5432/${DB_NAME}"
